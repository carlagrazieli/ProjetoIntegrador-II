<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Plataforma para facilitar o reencontro de animais perdidos com seus tutores">
  <title>Plataforma Animais Perdidos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>🐾 Plataforma Animais Perdidos</h1>
    <p>Facilitando o reencontro de animais com seus tutores</p>
  </header>

  <nav role="navigation" aria-label="Menu principal">
    <a href="#inicio">Início</a>
    <a href="#cadastro">Cadastrar Animal</a>
    <a href="#buscar">Buscar Animal</a>
    <a href="#ongs">ONGs Parceiras</a>
    <a href="#contato">Contato</a>
  </nav>

  <main class="container">
    <section class="form-section" id="cadastro">
      <h2>Cadastro de Animal</h2>
      <form method="POST" action="/api/animais" aria-labelledby="cadastro">
        <div class="form-group">
          <label for="nome">Nome do Animal <span aria-label="campo obrigatório">*</span></label>
          <input type="text" id="nome" name="nome" placeholder="Ex: Rex" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="tipo">Tipo <span aria-label="campo obrigatório">*</span></label>
          <select id="tipo" name="tipo" required aria-required="true">
            <option value="">Selecione uma opção</option>
            <option value="cachorro">Cachorro</option>
            <option value="gato">Gato</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div class="form-group">
          <label for="raca">Raça</label>
          <input type="text" id="raca" name="raca" placeholder="Ex: Labrador">
        </div>

        <div class="form-group">
          <label for="cor">Cor</label>
          <input type="text" id="cor" name="cor" placeholder="Ex: Preto e Branco">
        </div>

        <div class="form-group">
          <label for="local">Local onde foi visto/perdido <span aria-label="campo obrigatório">*</span></label>
          <input type="text" id="local" name="local" placeholder="Ex: Bairro Centro, Uruguaiana" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" name="descricao" placeholder="Informações adicionais..."></textarea>
        </div>

        <button type="submit">Cadastrar Animal</button>
      </form>
    </section>

    <section class="search-box" id="buscar">
      <h2>Buscar Animal</h2>
      <form method="GET" action="/api/buscar" aria-labelledby="buscar">
        <div class="form-group">
          <label for="busca">Digite nome, raça ou local</label>
          <input type="text" id="busca" name="busca" placeholder="Ex: Gato Siamês, Bairro Centro">
        </div>
        <button type="submit">Buscar</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Plataforma Animais Perdidos. Todos os direitos reservados. | <a href="#contato">Contato</a></p>
  </footer>

</body>
</html>
